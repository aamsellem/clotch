name: Clotch
options:
  bundleIdPrefix: com.clotch
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"

settings:
  base:
    SWIFT_VERSION: "5"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic
    PRODUCT_BUNDLE_IDENTIFIER: com.clotch.app

targets:
  Clotch:
    type: application
    platform: macOS
    sources:
      - path: Clotch
        excludes:
          - "Resources/clotch-hook.sh"
    resources:
      - path: Clotch/Resources/Assets.xcassets
      - path: Clotch/Resources/clotch-hook.sh
    settings:
      base:
        PRODUCT_NAME: Clotch
        PRODUCT_BUNDLE_IDENTIFIER: com.clotch.app
        INFOPLIST_FILE: Clotch/Info.plist
        CODE_SIGN_ENTITLEMENTS: Clotch/Clotch.entitlements
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: true
        ENABLE_HARDENED_RUNTIME: true
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
    info:
      path: Clotch/Info.plist
      properties:
        LSUIElement: true
        NSHighResolutionCapable: true
        CFBundleDisplayName: Clotch
